apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gluetun
  namespace: gluetun
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: qbittorrent
            port:
              number: 8080