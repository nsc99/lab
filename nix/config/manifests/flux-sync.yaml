---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: lab
  namespace: flux-system
spec:
  interval: 5m0s
  ref:
    branch: master
  timeout: 1m0s
  url: https://github.com/nsc99/lab
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: lab
  namespace: flux-system
spec:
  interval: 10m0s
  timeout: 1m0s
  path: ./cluster
  prune: true
  sourceRef:
    kind: GitRepository
    name: lab
